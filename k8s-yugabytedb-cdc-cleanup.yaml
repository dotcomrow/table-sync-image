apiVersion: batch/v1
kind: Job
metadata:
  name: yugabytedb-cdc-cleanup
  namespace: your-namespace  # Replace with your actual namespace
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: yb-admin-cleanup
        image: yugabytedb/yugabyte:2.20.0.0-b2  # Use official YugabyteDB image with yb-admin
        command: ["/bin/bash", "-c"]
        args:
        - |
          echo "🧹 Starting YugabyteDB CDC stream cleanup..."
          
          # Set master addresses - adjust these to your actual master addresses
          MASTER_ADDRESSES="yb-master-0.yb-masters.yugabyte.svc.cluster.local:7100,yb-master-1.yb-masters.yugabyte.svc.cluster.local:7100,yb-master-2.yb-masters.yugabyte.svc.cluster.local:7100"
          
          echo "Master addresses: $MASTER_ADDRESSES"
          
          # List current CDC streams
          echo "📋 Listing current CDC streams..."
          /home/yugabyte/bin/yb-admin --master_addresses $MASTER_ADDRESSES list_cdc_streams
          
          # Get all stream IDs and delete them
          echo "🗑️ Deleting all CDC streams..."
          STREAM_IDS=$(/home/yugabyte/bin/yb-admin --master_addresses $MASTER_ADDRESSES list_cdc_streams | grep -i "stream_id" | awk '{print $2}' | tr -d ':')
          
          for stream_id in $STREAM_IDS; do
            if [ ! -z "$stream_id" ]; then
              echo "Deleting stream: $stream_id"
              /home/yugabyte/bin/yb-admin --master_addresses $MASTER_ADDRESSES delete_cdc_stream $stream_id
            fi
          done
          
          # Verify cleanup
          echo "✅ Cleanup completed. Remaining streams:"
          /home/yugabyte/bin/yb-admin --master_addresses $MASTER_ADDRESSES list_cdc_streams
          
          echo "🎉 CDC stream cleanup job completed successfully!"
        env:
        - name: MASTER_ADDRESSES
          value: "yb-master-0.yb-masters.yugabyte.svc.cluster.local:7100"  # Adjust this
      backoffLimit: 3
---
# Alternative: Use a CronJob for regular cleanup
apiVersion: batch/v1
kind: CronJob
metadata:
  name: yugabytedb-cdc-cleanup-cron
  namespace: your-namespace  # Replace with your actual namespace
spec:
  schedule: "0 */6 * * *"  # Run every 6 hours
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: yb-admin-cleanup
            image: yugabytedb/yugabyte:2.20.0.0-b2
            command: ["/bin/bash", "-c"]
            args:
            - |
              echo "🧹 Scheduled YugabyteDB CDC stream cleanup..."
              MASTER_ADDRESSES="yb-master-0.yb-masters.yugabyte.svc.cluster.local:7100"
              
              # Only clean up if there are streams
              STREAM_COUNT=$(/home/yugabyte/bin/yb-admin --master_addresses $MASTER_ADDRESSES list_cdc_streams | grep -c "stream_id" || echo "0")
              
              if [ "$STREAM_COUNT" -gt "0" ]; then
                echo "Found $STREAM_COUNT CDC streams to clean up"
                STREAM_IDS=$(/home/yugabyte/bin/yb-admin --master_addresses $MASTER_ADDRESSES list_cdc_streams | grep -i "stream_id" | awk '{print $2}' | tr -d ':')
                
                for stream_id in $STREAM_IDS; do
                  if [ ! -z "$stream_id" ]; then
                    echo "Deleting stream: $stream_id"
                    /home/yugabyte/bin/yb-admin --master_addresses $MASTER_ADDRESSES delete_cdc_stream $stream_id
                  fi
                done
                echo "✅ Cleanup completed"
              else
                echo "ℹ️ No CDC streams found to clean up"
              fi