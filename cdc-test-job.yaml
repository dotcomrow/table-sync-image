apiVersion: batch/v1
kind: Job
metadata:
  name: cdc-compatibility-test
  namespace: default
  labels:
    app: cdc-test
    version: test-mode
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300  # Clean up after 5 minutes
  template:
    metadata:
      labels:
        app: cdc-test
        version: test-mode
    spec:
      restartPolicy: Never
      containers:
      - name: cdc-test
        image: table-sync-app:test-mode
        imagePullPolicy: IfNotPresent
        env:
        # Enable CDC test mode
        - name: CDC_TEST_MODE
          value: "true"
        
        # Required environment variables
        - name: BIGQUERY_PROJECT_ID
          value: "test-project"
        
        - name: DATABASE_URL
          value: "postgresql://yugabyte@yb-tserver-service.yugabyte.svc.cluster.local:5433/mcp"
        
        - name: DEBEZIUM_CONNECTOR_URL
          value: "http://kafka-connect-service:8083"
        
        - name: LOG_LEVEL
          value: "INFO"
        
        - name: CLEANUP_CDC_ON_STARTUP
          value: "true"
        
        # Scan interval (not really used in test mode)
        - name: SCAN_INTERVAL_SECONDS
          value: "30"
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Health check (though job will exit after test)
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3