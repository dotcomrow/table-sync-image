yugabytedb:
  mock: false
  host: yugabytedb  # Corrected hostname for YugabyteDB
  port: 5433
  user: yugabyte
  password: yugabyte
  database: testdb
  master_addresses: "yugabytedb:7100"  # Corrected master address
  excluded_databases: "postgres,yugabyte,vaultadmin,system_platform,kafka"

bigquery:
  mock: false
  credentials_path: /vault/secrets/gcp-key.json

kafka_connect:
  mock: false
  url: http://kafka_connect:8083  # Updated to match the Kafka Connect service name
  schema_registry_url: http://schema-registry:8081
  bootstrap: kafka:9092  # Corrected bootstrap server for Kafka

logging:
  level: DEBUG

health_check:
  port: 8080

metrics:
  port: 8000
  enabled: true

processing:
  batch_size: 10000