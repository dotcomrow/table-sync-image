scan_interval_seconds: 30
comprehensive_database_scan: true
excluded_databases: "postgres,yugabyte,vaultadmin,system_platform,kafka"
max_scan_threads: 10
mock: false

yugabytedb:
  mock: false
  host: localhost
  port: 5433
  user: yugabyte
  password: yugabyte
  database: testdb
  master_addresses: "localhost:7100"

bigquery:
  mock: true
  project_id: k8s-kafka-774d
  credentials_path: /vault/secrets/gcp-key.json
  location: US

kafka_connect:
  mock: false
  url: http://localhost:8083
  recreate_failed_connectors: true
  bootstrap: localhost:9092

logging:
  level: DEBUG
  format: json
  log_http_bodies_on_failure: true

health_check:
  port: 8080

metrics:
  port: 8000
  enabled: true

processing:
  batch_size: 10000