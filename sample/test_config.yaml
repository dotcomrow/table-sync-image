yugabytedb:
  mock: false
  host: yugabytedb  # Corrected hostname for YugabyteDB
  port: 5433
  user: yugabyte
  password: yugabyte
  database: testdb
  master_addresses: "yugabytedb:7100"  # Corrected master address
  excluded_databases: "postgres,yugabyte,vaultadmin,system_platform,kafka"

redis:
  url: redis://:<path:secret/data/redis#password>@redis-0.redis-headless.redis.svc.cluster.local:6379/0
  cacheKey: "table-sync-cache"
  default_ttl: 300
  cache_keys:
    row_counts: "row_counts"

bigquery:
  mock: false
  credentials_path: /vault/secrets/gcp-key.json

kafka_connect:
  mock: false
  url: http://kafka_connect:8083  # Updated to match the Kafka Connect service name
  schema_registry_url: http://schema-registry:8081
  bootstrap: kafka:9092  # Corrected bootstrap server for Kafka

logging:
  level: DEBUG
  enable_cloud_logging: false

health_check:
  port: 8080

processing:
  max_scan_threads: 4
  max_preparation_threads: 2
  max_cache_check_threads: 6
  scan_interval_seconds: 30