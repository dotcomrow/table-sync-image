name: Build and Push Image
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set timestamp tag
        id: set-tag
        run: echo "tag=ts-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Compute image coords
        id: meta
        run: |
          echo "owner=${GITHUB_REPOSITORY%/*}"   >> "$GITHUB_OUTPUT"
          echo "repo=${GITHUB_REPOSITORY##*/}"   >> "$GITHUB_OUTPUT"

      # Login to GHCR with GITHUB_TOKEN; use OWNER as the username
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.meta.outputs.owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # (Optional but recommended) Buildx builder
      - uses: docker/setup-buildx-action@v3

      # Build + push in one step (avoids tag/push mismatch)
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}:${{ steps.set-tag.outputs.tag }}
          provenance: false   # set true if your org requires SBOM/provenance